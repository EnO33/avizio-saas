version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      clerk:
        patterns:
          - "@clerk/*"
      drizzle:
        patterns:
          - "drizzle-*"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "@biomejs/*"
    # `include: scope` injects (deps) / (deps-development) — leave prefix as
    # `chore` so the result is a clean `chore(deps): ...`, not `chore(deps)(deps):`.
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
