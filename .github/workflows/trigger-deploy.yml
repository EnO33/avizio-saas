name: Deploy Trigger.dev

on:
  push:
    branches: [main]
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "package.json"
      - "bun.lock"
  # Lets us re-deploy manually from the Actions tab without a code change —
  # useful if a secret rotation or Trigger.dev dashboard change needs a
  # fresh build.
  workflow_dispatch:

concurrency:
  group: trigger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tasks to Trigger.dev cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Trigger.dev (prod)
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: bun run trigger:deploy
