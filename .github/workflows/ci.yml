name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      # Dummy values to satisfy zod env parsing at build time.
      # Real secrets live in Vercel env vars, never here.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      CLERK_PUBLISHABLE_KEY: pk_test_ci_dummy
      CLERK_SECRET_KEY: sk_test_ci_dummy
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        # `high` threshold: ignores dev-only moderate issues (e.g. esbuild dev-server CORS).
        # Tighten to `moderate` once all upstream moderates are addressed.
        run: bun audit --audit-level=high

      - name: Typecheck
        run: bun run typecheck

      - name: Biome check
        run: bun run check

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build
